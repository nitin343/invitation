<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitation — Cinematic Scroll</title>
    
    <!-- CRITICAL: Preload main background BEFORE anything else -->
    <link rel="preload" href="/assets/frame4-opt.avif" as="image" type="image/avif" fetchpriority="high" />
    <link rel="preload" href="/assets/frame4-opt.webp" as="image" type="image/webp" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+Kannada:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- Other critical images -->
    <link rel="preload" href="/assets/ganesh-opt.avif" as="image" type="image/avif" fetchpriority="high" />
    <!-- Secondary images - high priority -->
    <link rel="preload" href="/assets/couple-photo-1-opt.avif" as="image" type="image/avif" />
    <!-- Event images - defer loading (WebP fallback) -->
    <link rel="prefetch" href="/assets/haldi-opt.avif" as="image" type="image/avif" />
    <link rel="prefetch" href="/assets/reception-opt.avif" as="image" type="image/avif" />

    <!-- Minimal critical CSS -->
    <style>
      * { margin: 0; padding: 0; }
      body { background: #050a18; overflow: hidden; }
      #root { width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
